<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Iniciar sesión en APPLENDE Academia">
<title>Iniciar sesión · APPLENDE</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2744;--navy-dark:#0E1A30;--blue:#2E4A8E;--purple:#6B6BBB;
  --green:#8DC63F;--green-dark:#7AB232;
  --text:#1A2744;--muted:#6B7A90;--white:#fff;--offwhite:#F5F7FA;--border:#E4E7ED;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;color:var(--text);background:var(--navy-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;line-height:1.5;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(107,107,187,.15), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(141,198,63,.1), transparent 50%);
}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;font-size:inherit;color:inherit;}

.login-wrap{width:100%;max-width:420px;}

.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{height:56px;width:auto;display:inline-block;}

.login-card{background:var(--white);border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-tit{font-family:'Josefin Sans',sans-serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:6px;text-align:center;}
.login-desc{font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px;}

.login-row{margin-bottom:16px;}
.login-lbl{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--offwhite);transition:all .2s;}
.login-input:focus{outline:none;border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(141,198,63,.12);}

.pwd-wrap{position:relative;}
.pwd-wrap .login-input{padding-right:42px;}
.pwd-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.5;padding:4px 8px;line-height:1;}
.pwd-toggle:hover{opacity:.9;}

.login-row-aux{display:flex;justify-content:space-between;align-items:center;margin:8px 0 20px;font-size:12px;}
.login-remember{display:flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;}
.login-remember input{accent-color:var(--green);cursor:pointer;}
.login-forgot{color:var(--purple);font-weight:600;}
.login-forgot:hover{text-decoration:underline;}

.login-btn{display:block;width:100%;background:linear-gradient(135deg,var(--green),var(--green-dark));color:var(--navy);padding:14px;border-radius:10px;font-weight:800;font-size:14px;letter-spacing:.4px;transition:all .2s;box-shadow:0 4px 16px rgba(141,198,63,.25);}
.login-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(141,198,63,.4);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.login-btn-loader{display:inline-block;width:14px;height:14px;border:2px solid var(--navy);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:-3px;}
@keyframes spin{to{transform:rotate(360deg);}}

.login-divider{display:flex;align-items:center;gap:12px;margin:22px 0 18px;}
.login-divider-line{flex:1;height:1px;background:var(--border);}
.login-divider-txt{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}

.login-signup{text-align:center;font-size:13px;color:var(--muted);}
.login-signup a{color:var(--navy);font-weight:700;border-bottom:1.5px solid var(--green);padding-bottom:1px;}

.error-box{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-left:4px solid #dc2626;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:18px;display:none;}
.error-box.show{display:block;}
.error-box strong{color:#991B1B;display:block;font-size:12.5px;margin-bottom:2px;}
.error-box span{color:#991B1B;font-size:12px;line-height:1.5;}
.error-box a{color:#991B1B;text-decoration:underline;font-weight:700;}

.success-box{background:rgba(141,198,63,.1);border:1px solid rgba(141,198,63,.35);border-left:4px solid var(--green);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:18px;display:none;}
.success-box.show{display:block;}
.success-box strong{color:var(--green-dark);display:block;font-size:13px;margin-bottom:2px;}
.success-box span{color:var(--navy);font-size:12.5px;}

.back-link{display:block;text-align:center;font-size:12px;color:rgba(255,255,255,.55);margin-top:20px;}
.back-link:hover{color:#fff;}

.footer-note{text-align:center;font-size:11px;color:rgba(255,255,255,.4);margin-top:24px;letter-spacing:.3px;}
.footer-note strong{color:rgba(255,255,255,.7);}
</style>
</head>

  <div class="login-card">
    <h1 class="login-tit">Iniciar sesión</h1>
    <p class="login-desc">Accedé a tu panel académico</p>

    <div class="error-box" id="error-box">
      <strong id="error-tit">Error</strong>
      <span id="error-desc"></span>
    </div>

    <div class="success-box" id="success-box">
      <strong id="success-tit">¡Bienvenido!</strong>
      <span id="success-desc">Redirigiendo a tu panel…</span>
    </div>

    <form id="form-login">

      <div class="login-row">
        <label class="login-lbl" for="inp-email">Correo electrónico</label>
        <input type="email" class="login-input" id="inp-email" placeholder="tu@email.com" autocomplete="email" required>
      </div>

      <div class="login-row">
        <label class="login-lbl" for="inp-password">Contraseña</label>
        <div class="pwd-wrap">
          <input type="password" class="login-input" id="inp-password" placeholder="Tu contraseña" autocomplete="current-password" required>
          <button type="button" class="pwd-toggle" id="tog-pwd" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <div class="login-row-aux">
        <label class="login-remember">
          <input type="checkbox" id="inp-remember" checked>
          <span>Mantener sesión</span>
        </label>
        <a href="#" class="login-forgot" id="link-forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="login-btn" id="btn-login">Iniciar sesión →</button>

      <div class="login-divider">
        <div class="login-divider-line"></div>
        <div class="login-divider-txt">O</div>
        <div class="login-divider-line"></div>
      </div>

      <div class="login-signup">
        ¿Nuevo aquí? <a href="/cursos.html">Regístrate</a>
      </div>

    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/applende-config.js"></script>
<script src="/applende-auth.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════
   APPLENDE — login.html v2.0
   Login unificado con detección automática de rol y redirect
   ════════════════════════════════════════════════════════════════ */

// ─── Toggle mostrar/ocultar contraseña ───
document.getElementById('tog-pwd').addEventListener('click', function() {
  const inp = document.getElementById('inp-password');
  const isPwd = inp.type === 'password';
  inp.type = isPwd ? 'text' : 'password';
  this.textContent = isPwd ? '🙈' : '👁️';
});

// ─── Si ya hay sesión activa, redirigir directo al dashboard ───
(async function() {
  try {
    const sesion = await window.APPLENDE_AUTH.obtenerSesion();
    if (sesion) {
      const ruta = window.APPLENDE_AUTH.rutaDashboardPorRol(sesion.rol);
      console.log('[LOGIN] Sesión activa detectada, redirigiendo a:', ruta);
      window.location.href = ruta;
    }
  } catch (e) {
    console.warn('[LOGIN] No se pudo verificar sesión:', e);
  }
})();

// ─── Helpers UI ───
function mostrarError(titulo, mensaje) {
  document.getElementById('success-box').classList.remove('show');
  document.getElementById('error-tit').textContent = titulo;
  document.getElementById('error-desc').innerHTML = mensaje;
  document.getElementById('error-box').classList.add('show');
}

function mostrarExito(titulo, mensaje) {
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('success-tit').textContent = titulo;
  document.getElementById('success-desc').textContent = mensaje;
  document.getElementById('success-box').classList.add('show');
}

function ocultarMensajes() {
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('success-box').classList.remove('show');
}

// ─── Submit del form ───
document.getElementById('form-login').addEventListener('submit', async function(e) {
  e.preventDefault();
  ocultarMensajes();

  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const password = document.getElementById('inp-password').value;

  if (!email || !password) {
    mostrarError('Datos incompletos', 'Ingresá tu email y contraseña.');
    return;
  }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="login-btn-loader"></span>Verificando credenciales…';

  const sb = window.obtenerSupabase();
  if (!sb) {
    mostrarError('Error de configuración', 'No se pudo inicializar la conexión con el servidor. Recargá la página.');
    btn.disabled = false;
    btn.innerHTML = 'Iniciar sesión →';
    return;
  }

  try {
    // ─── 1. Intento de login ───
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      console.error('[LOGIN] Error en signIn:', error);
      const msg = (error.message || '').toLowerCase();
      if (msg.includes('invalid') || msg.includes('credentials')) {
        mostrarError(
          'Credenciales incorrectas',
          'El email o contraseña son incorrectos. Verificá tus datos.'
        );
      } else if (msg.includes('email') && msg.includes('confirm')) {
        mostrarError(
          'Email no confirmado',
          'Revisá tu bandeja de entrada y confirmá tu email antes de iniciar sesión.'
        );
      } else {
        mostrarError('No pudimos iniciar sesión', error.message || 'Intentá nuevamente en unos instantes.');
      }
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión →';
      return;
    }

    if (!data || !data.user) {
      mostrarError('Error inesperado', 'No se pudo obtener la sesión. Intentá nuevamente.');
      btn.disabled = false;
      btn.innerHTML = 'Iniciar sesión →';
      return;
    }

    // ─── 2. Consultar rol del perfil ───
    btn.innerHTML = '<span class="login-btn-loader"></span>Cargando tu panel…';

    const { data: perfil, error: errPerfil } = await sb
      .from('perfiles')
      .select('nombre, apellido, rol')
      .eq('id', data.user.id)
      .maybeSingle();

    // ─── 3. Determinar ruta según rol ───
    let rol = 'alumno';  // default
    let nombreBienvenida = 'Bienvenido';

    if (perfil) {
      rol = perfil.rol || 'alumno';
      if (perfil.nombre) {
        nombreBienvenida = '¡Hola, ' + perfil.nombre.split(' ')[0] + '!';
      }
    } else if (errPerfil) {
      console.warn('[LOGIN] No se pudo leer perfil, usando rol por defecto:', errPerfil);
    }

    const ruta = window.APPLENDE_AUTH.rutaDashboardPorRol(rol);

    mostrarExito(nombreBienvenida, 'Redirigiendo a tu panel…');

    // Dar 1.2 segundos de feedback visual antes de redirigir
    setTimeout(function() {
      window.location.href = ruta;
    }, 1200);

  } catch (err) {
    console.error('[LOGIN] Error inesperado:', err);
    mostrarError('Error de conexión', 'Verificá tu internet e intentá nuevamente.');
    btn.disabled = false;
    btn.innerHTML = 'Iniciar sesión →';
  }
});

// ─── Recuperación de contraseña (email automático con Supabase) ───
document.getElementById('link-forgot').addEventListener('click', async function(e) {
  e.preventDefault();
  ocultarMensajes();

  const email = document.getElementById('inp-email').value.trim().toLowerCase();

  if (!email) {
    mostrarError(
      'Email requerido',
      'Primero escribí tu email en el campo de arriba, después hacé click en "¿Olvidaste tu contraseña?".'
    );
    document.getElementById('inp-email').focus();
    return;
  }

  // Validación básica de formato
  if (!email.includes('@') || !email.includes('.')) {
    mostrarError('Email inválido', 'Revisá que hayas escrito bien tu email.');
    return;
  }

  const sb = window.obtenerSupabase();
  if (!sb) {
    mostrarError('Error de configuración', 'Recargá la página e intentá de nuevo.');
    return;
  }

  const link = this;
  const textoOriginal = link.textContent;
  link.textContent = 'Enviando...';
  link.style.pointerEvents = 'none';

  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    if (error) {
      console.error('[LOGIN] Error al enviar reset:', error);
      mostrarError(
        'No pudimos enviar el email',
        'Intentá de nuevo en unos minutos o escribinos por WhatsApp al +591 64403290.'
      );
    } else {
      mostrarExito(
        '¡Email enviado!',
        'Te mandamos un enlace a ' + email + '. Revisá tu bandeja (y spam). El link vence en 1 hora.'
      );
    }
  } catch (err) {
    console.error('[LOGIN] Error inesperado en reset:', err);
    mostrarError(
      'Error de conexión',
      'Verificá tu internet o escribinos por WhatsApp al +591 64403290.'
    );
  } finally {
    link.textContent = textoOriginal;
    link.style.pointerEvents = 'auto';
  }
});
</script>
