<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#1A2744"/>
    </linearGradient>
    <linearGradient id="ov8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="50%" style="stop-color:rgba(26,39,68,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.96)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg8)"/>
  <!-- Modelo BIM 3D explotado -->
  <!-- Cuadrícula BIM de fondo -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="80" y1="0" x2="80" y2="225" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="160" y1="0" x2="160" y2="225" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="240" y1="0" x2="240" y2="225" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <line x1="320" y1="0" x2="320" y2="225" stroke="#8DC63F" stroke-width="0.3" opacity="0.2"/>
  <!-- Planta baja BIM -->
  <rect x="80" y="100" width="240" height="60" fill="#2E4A8E" opacity="0.6" stroke="#6B6BBB" stroke-width="1"/>
  <!-- Muros interior planta -->
  <line x1="180" y1="100" x2="180" y2="160" stroke="#8DC63F" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="130" x2="320" y2="130" stroke="#8DC63F" stroke-width="2" opacity="0.7"/>
  <!-- Ventanas en planta -->
  <rect x="90" y="100" width="40" height="4" fill="#87CEEB" opacity="0.8"/>
  <rect x="190" y="100" width="50" height="4" fill="#87CEEB" opacity="0.8"/>
  <rect x="280" y="100" width="30" height="4" fill="#87CEEB" opacity="0.8"/>
  <!-- Puerta en planta -->
  <rect x="178" y="128" width="4" height="20" fill="#8DC63F" opacity="0.8"/>
  <!-- Nivel superior BIM explotado hacia arriba -->
  <rect x="100" y="55" width="200" height="40" fill="#1A2744" opacity="0.7" stroke="#8DC63F" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Líneas de explosión BIM -->
  <line x1="100" y1="55" x2="80" y2="100" stroke="#6B6BBB" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="55" x2="320" y2="100" stroke="#6B6BBB" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="100" y1="95" x2="80" y2="160" stroke="#6B6BBB" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="95" x2="320" y2="160" stroke="#6B6BBB" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>
  <!-- Techo BIM -->
  <rect x="70" y="20" width="260" height="32" fill="#6B6BBB" opacity="0.4" stroke="#6B6BBB" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Etiqueta BIM -->
  <rect x="28" y="55" width="40" height="14" rx="3" fill="#8DC63F" opacity="0.9"/>
  <text x="48" y="65" font-family="Barlow,sans-serif" font-size="8" fill="#1A2744" text-anchor="middle" font-weight="800">BIM</text>
  <line x1="68" y1="62" x2="80" y2="100" stroke="#8DC63F" stroke-width="0.8" opacity="0.7"/>
  <!-- Flechas de coordenadas 3D -->
  <line x1="340" y1="160" x2="380" y2="160" stroke="#8DC63F" stroke-width="1.5" opacity="0.8"/>
  <polygon points="380,157 387,160 380,163" fill="#8DC63F" opacity="0.8"/>
  <line x1="340" y1="160" x2="340" y2="120" stroke="#6B6BBB" stroke-width="1.5" opacity="0.8"/>
  <polygon points="337,120 340,113 343,120" fill="#6B6BBB" opacity="0.8"/>
  <line x1="340" y1="160" x2="316" y2="178" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <text x="385" y="164" font-family="Barlow,sans-serif" font-size="9" fill="#8DC63F" font-weight="700">X</text>
  <text x="344" y="112" font-family="Barlow,sans-serif" font-size="9" fill="#6B6BBB" font-weight="700">Z</text>

  <rect width="400" height="225" fill="url(#ov8)"/>
  <text x="20" y="178" font-family="Barlow,sans-serif" font-size="9" font-weight="700" fill="#8DC63F" letter-spacing="2">BIM · AUTODESK · REVIT</text>
  <text x="20" y="196" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">Revit</text>
  <text x="20" y="213" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">Modelado BIM</text>
  <rect x="296" y="10" width="92" height="20" rx="10" fill="#6B6BBB"/>
  <text x="342" y="24" font-family="Barlow,sans-serif" font-size="9" font-weight="800" fill="white" text-anchor="middle">PRÓXIMAMENTE</text>
</svg>