<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2E4A8E"/>
    </linearGradient>
    <linearGradient id="ov9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="50%" style="stop-color:rgba(26,39,68,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.96)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg9)"/>
  <!-- Plano arquitectónico CAD de fondo -->
  <!-- Cuadrícula CAD -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="50" y1="0" x2="50" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="100" y1="0" x2="100" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="200" y1="0" x2="200" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="250" y1="0" x2="250" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <line x1="350" y1="0" x2="350" y2="225" stroke="#6B6BBB" stroke-width="0.3" opacity="0.3"/>
  <!-- Plano de planta CAD -->
  <rect x="50" y="40" width="200" height="130" fill="none" stroke="#8DC63F" stroke-width="2"/>
  <!-- Muros internos -->
  <line x1="50" y1="100" x2="180" y2="100" stroke="#8DC63F" stroke-width="2"/>
  <line x1="150" y1="40" x2="150" y2="100" stroke="#8DC63F" stroke-width="2"/>
  <line x1="150" y1="120" x2="250" y2="120" stroke="#8DC63F" stroke-width="2"/>
  <line x1="150" y1="100" x2="150" y2="170" stroke="#8DC63F" stroke-width="2"/>
  <!-- Ventanas -->
  <line x1="80" y1="40" x2="120" y2="40" stroke="#87CEEB" stroke-width="4"/>
  <line x1="180" y1="40" x2="220" y2="40" stroke="#87CEEB" stroke-width="4"/>
  <line x1="50" y1="55" x2="50" y2="85" stroke="#87CEEB" stroke-width="4"/>
  <!-- Puerta -->
  <line x1="180" y1="100" x2="180" y2="120" stroke="#8DC63F" stroke-width="2"/>
  <path d="M 180,100 Q 200,100 200,120" fill="none" stroke="#8DC63F" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Cotas -->
  <line x1="50" y1="185" x2="250" y2="185" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="182" x2="50" y2="188" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="250" y1="182" x2="250" y2="188" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <text x="150" y="197" font-family="Barlow,sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.6">10.00 m</text>
  <line x1="18" y1="40" x2="18" y2="170" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="15" y1="40" x2="21" y2="40" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="15" y1="170" x2="21" y2="170" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <text x="10" y="110" font-family="Barlow,sans-serif" font-size="8" fill="white" text-anchor="middle" opacity="0.6" transform="rotate(-90 10 110)">6.50 m</text>
  <!-- Símbolo norte -->
  <circle cx="330" cy="70" r="18" fill="none" stroke="#6B6BBB" stroke-width="1"/>
  <polygon points="330,52 322,78 330,72 338,78" fill="#6B6BBB" opacity="0.8"/>
  <text x="330" y="95" font-family="Barlow,sans-serif" font-size="10" fill="#6B6BBB" text-anchor="middle" font-weight="700">N</text>
  <!-- Escala -->
  <text x="290" y="50" font-family="Barlow,sans-serif" font-size="7" fill="white" opacity="0.6">ESC 1:50</text>
  <!-- Banderas internacionales -->
  <text x="300" y="120" font-size="18">🇧🇴</text>
  <text x="330" y="120" font-size="18">🇵🇪</text>

  <rect width="400" height="225" fill="url(#ov9)"/>
  <text x="20" y="178" font-family="Barlow,sans-serif" font-size="9" font-weight="700" fill="#6B6BBB" letter-spacing="2">CAD · BOLIVIA &amp; PERÚ</text>
  <text x="20" y="196" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">Vectorworks</text>
  <text x="20" y="213" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">+ Plugins</text>
  <rect x="296" y="10" width="92" height="20" rx="10" fill="#dc2626"/>
  <text x="342" y="24" font-family="Barlow,sans-serif" font-size="9" font-weight="800" fill="white" text-anchor="middle">🔴 EN VIVO</text>
</svg>