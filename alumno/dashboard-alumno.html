<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Academia · APPLENDE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#1A2744; --navy-dark:#0E1A30; --blue:#2E4A8E;
      --green:#8DC63F; --green-dark:#6aaa2a; --purple:#6B6BBB;
      --gray:#BFBFBF; --white:#fff; --offwhite:#F5F7FA;
      --text:#2C3A52; --muted:#6B7A90; --border:#E2E8F0;
      --amber:#D97706; --amber-soft:#FEF3C7;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'Barlow',sans-serif;color:var(--text);background:var(--offwhite);min-height:100vh;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}

    /* ─── LOADING ─── */
    #loading{
      position:fixed;inset:0;background:var(--navy);z-index:100;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
    }
    #loading.hidden{display:none;}
    .loader-bar{width:40px;height:2px;background:var(--green);animation:loaderPulse 1s ease-in-out infinite;margin-right:14px;}
    @keyframes loaderPulse{0%,100%{opacity:0.3;transform:scaleX(1);}50%{opacity:1;transform:scaleX(1.5);}}

    /* ─── NAVBAR ─── */
    .nav{
      position:sticky;top:0;z-index:200;background:var(--navy);
      height:60px;padding:0 5%;display:flex;align-items:center;
      justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    .nav-brand{display:flex;align-items:center;gap:10px;color:#fff;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;}
    .nav-brand .squares{display:flex;gap:3px;}
    .nav-brand .squares span{width:14px;height:14px;border-radius:2px;}
    .nav-brand .squares span:nth-child(1){background:var(--green);}
    .nav-brand .squares span:nth-child(2){background:var(--gray);}
    .nav-brand .squares span:nth-child(3){background:var(--purple);}
    .nav-brand .accent{color:var(--green);}
    .badge-rol{
      background:rgba(141,198,63,0.2);color:var(--green);
      font-size:10px;font-weight:700;letter-spacing:2px;
      text-transform:uppercase;padding:4px 10px;border-radius:20px;
      margin-left:10px;border:1px solid rgba(141,198,63,0.4);
    }
    .nav-user{display:flex;align-items:center;gap:14px;color:#fff;}
    .user-info{text-align:right;line-height:1.2;}
    .user-info .name{font-size:13px;font-weight:600;}
    .user-info .email{font-size:11px;color:rgba(255,255,255,0.5);}
    .btn-logout{
      background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;
      padding:7px 14px;border-radius:20px;font-family:'Barlow',sans-serif;
      font-weight:600;font-size:12px;cursor:pointer;transition:all .2s;
    }
    .btn-logout:hover{background:rgba(220,38,38,0.15);border-color:#dc2626;color:#ff6b68;}

    /* ─── Volver al sitio ─── */
    .nav-back{
      display:flex;align-items:center;gap:6px;
      color:rgba(255,255,255,0.75);
      padding:7px 14px;border-radius:20px;
      border:1px solid rgba(255,255,255,0.18);
      font-family:'Barlow',sans-serif;font-weight:600;font-size:12px;
      letter-spacing:0.3px;transition:all .2s;
    }
    .nav-back:hover{
      color:var(--green);border-color:var(--green);
      background:rgba(141,198,63,0.10);
    }
    .nav-back .arrow{font-size:14px;line-height:1;}
    @media(max-width:700px){
      .nav-back .label-full{display:none;}
    }

    main{max-width:1200px;margin:0 auto;padding:40px 5%;}

    /* ─── WELCOME HERO ─── */
    .welcome-hero{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);
      color:#fff;border-radius:14px;padding:36px 32px;margin-bottom:32px;
      position:relative;overflow:hidden;
    }
    .welcome-hero::before{
      content:'';position:absolute;top:-40%;right:-10%;
      width:50%;aspect-ratio:1;
      background:radial-gradient(circle,rgba(141,198,63,0.25) 0%,transparent 70%);
      pointer-events:none;
    }
    .welcome-hero .kicker{
      font-size:11px;font-weight:700;letter-spacing:3px;
      text-transform:uppercase;color:var(--green);margin-bottom:10px;
    }
    .welcome-hero h1{
      font-family:'Josefin Sans',sans-serif;font-weight:700;
      font-size:clamp(28px,4vw,38px);letter-spacing:1px;margin-bottom:10px;
    }
    .welcome-hero p{color:rgba(255,255,255,0.75);font-size:14px;max-width:680px;line-height:1.55;}

    /* ─── SECTION TITLE ─── */
    .section-title{
      font-family:'Josefin Sans',sans-serif;font-weight:700;
      font-size:22px;color:var(--navy);margin-bottom:18px;letter-spacing:1px;
      display:flex;align-items:center;gap:10px;
    }
    .section-title::before{
      content:'';width:24px;height:3px;background:var(--green);border-radius:2px;
    }
    .section-title .count{
      font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;
      color:var(--muted);background:var(--offwhite);padding:3px 10px;
      border-radius:20px;letter-spacing:1px;border:1px solid var(--border);
    }

    /* ─── COURSE GRID ─── */
    .course-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
      gap:20px;margin-bottom:40px;
    }

    .course-card{
      background:var(--white);border-radius:14px;overflow:hidden;
      border:2px solid var(--border);transition:all .3s;
      display:flex;flex-direction:column;
    }
    .course-card:hover{
      border-color:var(--purple);transform:translateY(-2px);
      box-shadow:0 12px 32px rgba(107,107,187,0.12);
    }

    .course-banner{
      height:120px;background:linear-gradient(135deg,var(--purple) 0%,var(--blue) 100%);
      position:relative;display:flex;align-items:flex-end;padding:16px 20px;
      overflow:hidden;
    }
    .course-banner::before{
      content:'';position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);
      background-size:24px 24px;
    }
    .course-banner .nivel{
      position:relative;z-index:1;
      font-size:10px;font-weight:700;letter-spacing:2px;
      text-transform:uppercase;color:#fff;
      background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:20px;
      border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(4px);
    }
    .course-banner .modalidad-pill{
      position:relative;z-index:1;margin-left:8px;
      font-size:10px;font-weight:700;letter-spacing:1.5px;
      text-transform:uppercase;color:#fff;
      padding:4px 10px;border-radius:20px;
      border:1px solid rgba(255,255,255,0.25);backdrop-filter:blur(4px);
      display:inline-flex;align-items:center;gap:4px;
    }
    .course-banner .modalidad-pill.virtual{background:rgba(107,107,187,0.55);}
    .course-banner .modalidad-pill.presencial{background:rgba(141,198,63,0.55);}
    .course-banner .squares{
      position:absolute;top:14px;right:16px;display:flex;gap:3px;z-index:1;
    }
    .course-banner .squares span{width:10px;height:10px;border-radius:2px;opacity:0.7;}
    .course-banner .squares span:nth-child(1){background:var(--green);}
    .course-banner .squares span:nth-child(2){background:var(--gray);}
    .course-banner .squares span:nth-child(3){background:var(--purple);}

    .course-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;}
    .course-title{
      font-family:'Josefin Sans',sans-serif;font-weight:700;
      font-size:18px;color:var(--navy);line-height:1.2;
      margin-bottom:8px;letter-spacing:0.3px;
    }
    .course-desc{
      font-size:13px;color:var(--muted);line-height:1.5;
      margin-bottom:16px;flex:1;
    }
    .course-meta{
      background:var(--offwhite);border-radius:8px;padding:12px 14px;
      margin-bottom:14px;display:grid;gap:8px;
    }
    .meta-row{
      display:flex;justify-content:space-between;align-items:center;font-size:12px;
    }
    .meta-row .label{
      color:var(--muted);font-weight:600;letter-spacing:0.5px;
      display:flex;align-items:center;gap:6px;
    }
    .meta-row .value{color:var(--navy);font-weight:600;}

    .course-status{
      display:inline-flex;align-items:center;gap:6px;
      font-size:10px;font-weight:700;letter-spacing:1.5px;
      text-transform:uppercase;padding:4px 10px;border-radius:20px;
      margin-bottom:12px;align-self:flex-start;
    }
    .course-status.activo{background:rgba(141,198,63,0.15);color:var(--green-dark);border:1px solid var(--green);}
    .course-status.pendiente{background:var(--amber-soft);color:var(--amber);border:1px solid #FCD34D;}
    .course-status.completado{background:rgba(107,107,187,0.15);color:var(--purple);border:1px solid var(--purple);}

    .course-cta{
      padding:12px 18px;border:none;border-radius:10px;
      font-family:'Barlow',sans-serif;font-weight:800;font-size:13px;
      letter-spacing:1px;text-transform:uppercase;cursor:pointer;
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:var(--navy);box-shadow:0 4px 14px rgba(141,198,63,0.3);
      transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .course-cta:hover{
      transform:translateY(-1px);box-shadow:0 6px 20px rgba(141,198,63,0.45);
    }
    .course-cta.disabled{
      background:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none;
    }
    .course-cta.disabled:hover{transform:none;box-shadow:none;}

    /* ─── EMPTY STATE ─── */
    .empty-state{
      background:var(--white);border-radius:14px;padding:60px 32px;
      text-align:center;border:2px dashed var(--border);
    }
    .empty-state .emoji{font-size:48px;margin-bottom:16px;}
    .empty-state h3{
      font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:20px;
      color:var(--navy);margin-bottom:8px;letter-spacing:0.5px;
    }
    .empty-state p{
      color:var(--muted);font-size:14px;margin-bottom:18px;
      max-width:400px;margin-left:auto;margin-right:auto;
    }
    .empty-state a{
      display:inline-block;padding:12px 24px;
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:var(--navy);border-radius:20px;
      font-family:'Barlow',sans-serif;font-weight:800;font-size:13px;
      letter-spacing:1px;text-transform:uppercase;
      box-shadow:0 4px 16px rgba(141,198,63,0.3);transition:all .3s;
    }
    .empty-state a:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(141,198,63,0.4);}

    /* ─── MODAL DE DETALLE ─── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(14,26,48,0.85);z-index:1000;
      display:none;align-items:center;justify-content:center;padding:20px;
      backdrop-filter:blur(6px);
    }
    .modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal-box{
      background:var(--white);border-radius:14px;max-width:520px;width:100%;
      max-height:90vh;overflow-y:auto;
    }
    .modal-head{
      background:var(--navy);color:#fff;padding:24px 28px;
      border-radius:14px 14px 0 0;position:relative;
    }
    .modal-head .kicker{
      font-size:10px;font-weight:700;letter-spacing:2.5px;
      text-transform:uppercase;color:var(--green);margin-bottom:6px;
    }
    .modal-head h3{
      font-family:'Josefin Sans',sans-serif;font-weight:700;
      font-size:22px;letter-spacing:0.5px;
    }
    .modal-close{
      position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);
      border:none;color:#fff;width:32px;height:32px;border-radius:50%;
      cursor:pointer;font-size:15px;
    }
    .modal-body{padding:24px 28px;}
    .modal-body p{color:var(--text);font-size:14px;line-height:1.6;margin-bottom:14px;}
    .modal-body .info-box{
      background:var(--offwhite);border-left:3px solid var(--purple);
      padding:14px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;
    }
    .modal-body .info-box strong{color:var(--navy);}
    .modal-body ul{margin-left:20px;font-size:13px;color:var(--muted);line-height:1.8;}

    @media(max-width:700px){
      .nav{padding:0 4%;}
      .nav-brand{font-size:15px;}
      .nav-user .user-info{display:none;}
      main{padding:28px 5%;}
      .welcome-hero{padding:26px 22px;}
      .course-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

  <div id="loading">
    <span class="loader-bar"></span>
    Cargando tu academia…
  </div>

  <nav class="nav">
    <div class="nav-brand">
      <span class="squares"><span></span><span></span><span></span></span>
      <span>APPLENDE<span class="accent">.</span></span>
      <span class="badge-rol">Estudiante</span>
    </div>
    <div class="nav-user">
      <a href="/cursos.html" class="nav-back" title="Volver a la Academia">
        <span class="arrow">←</span>
        <span class="label-full">Volver a la Academia</span>
      </a>
      <div class="user-info">
        <div class="name" id="userName">Cargando…</div>
        <div class="email" id="userEmail"></div>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </nav>

  <main>

    <section class="welcome-hero">
      <p class="kicker">Mi academia · Santa Cruz, Bolivia</p>
      <h1 id="welcomeTitle">Bienvenido</h1>
      <p>Aquí podrás acceder a tus cursos, ver el progreso de tus clases en vivo,
         descargar materiales y obtener tus certificados al finalizar.</p>
    </section>

    <h2 class="section-title">
      Mis cursos
      <span class="count" id="courseCount" style="display:none;">0</span>
    </h2>

    <div id="coursesContainer">
      <!-- Renderizado dinámicamente -->
    </div>

  </main>

  <!-- MODAL DETALLE DE CURSO -->
  <div class="modal-overlay" id="modalDetail">
    <div class="modal-box">
      <div class="modal-head">
        <button class="modal-close" onclick="document.getElementById('modalDetail').classList.remove('open');">✕</button>
        <p class="kicker">Tu curso</p>
        <h3 id="modalTitle">—</h3>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://wdoqzsmwuvozhkclqbjk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indkb3F6c213dXZvemhrY2xxYmprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTI0NzQsImV4cCI6MjA5MjI4ODQ3NH0.qlfh1Qz695Kg_hH5n-LbtAw6r-1gzpkCe5NOznxNSnM';
    const ROLES_PERMITIDOS = ['estudiante','instructor'];
    const LOGIN_URL = '/login.html';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let misCursos = [];
    let misPendientes = [];

    // ═══════════════════════════════════════════════════════════════
    // GUARDIA DE SESIÓN + CARGA DE DATOS
    // ═══════════════════════════════════════════════════════════════
    (async function init(){
      const {data:{session}} = await supabaseClient.auth.getSession();
      if(!session){window.location.href=LOGIN_URL;return;}

      const {data:perfil, error} = await supabaseClient
        .from('perfiles').select('rol,nombre,apellido')
        .eq('id', session.user.id).single();

      if(error||!perfil){
        await supabaseClient.auth.signOut();
        window.location.href = LOGIN_URL;return;
      }

      if(!ROLES_PERMITIDOS.includes(perfil.rol)){
        const destino = {
          admin:'/admin/dashboard.html',
          coordinador:'/coordinador/dashboard.html'
        }[perfil.rol] || LOGIN_URL;
        window.location.href = destino;return;
      }

      document.getElementById('userName').textContent = `${perfil.nombre} ${perfil.apellido}`;
      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('welcomeTitle').textContent = `Bienvenido, ${perfil.nombre}`;
      document.getElementById('loading').classList.add('hidden');

      await cargarCursosYPendientes(session.user.id, session.user.email);
    })();

    // ═══════════════════════════════════════════════════════════════
    // CARGAR CURSOS INSCRITOS + SOLICITUDES PENDIENTES
    // ═══════════════════════════════════════════════════════════════
    async function cargarCursosYPendientes(userId, userEmail){
      // 1. Inscripciones oficiales (aprobadas por Karina)
      const {data:inscripciones, error:errI} = await supabaseClient
        .from('inscripciones')
        .select(`
          id, estado_pago, acceso_activo, fecha_activacion, fecha_expiracion,
          curso_completado, precio_pagado, moneda_pago, modalidad,
          curso:cursos(id, titulo, slug, descripcion_corta, nivel, duracion_horas),
          cohorte:cohortes(id, nombre, fecha_inicio, fecha_fin, dias_clase, hora_inicio_clase, plataforma, link_clases)
        `)
        .eq('alumno_id', userId)
        .order('creado_en', {ascending:false});

      if(errI){console.error('Error inscripciones:', errI);}
      misCursos = inscripciones || [];

      // 2. Solicitudes pendientes (aún no aprobadas)
      const {data:pendientes, error:errP} = await supabaseClient
        .from('inscripciones_pendientes')
        .select(`
          id, estado, precio_cotizado, moneda, creado_en, modalidad,
          curso:cursos(id, titulo, slug, nivel)
        `)
        .eq('email_alumno', userEmail.toLowerCase())
        .eq('estado', 'pendiente_pago')
        .order('creado_en', {ascending:false});

      if(errP){console.error('Error pendientes:', errP);}
      misPendientes = pendientes || [];

      renderizar();
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDERIZAR TARJETAS
    // ═══════════════════════════════════════════════════════════════
    function renderizar(){
      const container = document.getElementById('coursesContainer');
      const total = misCursos.length + misPendientes.length;

      if(total === 0){
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🎓</div>
            <h3>Aún no tienes cursos activos</h3>
            <p>Explora el catálogo y comienza tu formación en ingeniería civil.</p>
            <a href="/cursos.html">Ver cursos disponibles</a>
          </div>`;
        document.getElementById('courseCount').style.display = 'none';
        return;
      }

      // Actualizar contador
      const badge = document.getElementById('courseCount');
      badge.style.display = 'inline-block';
      badge.textContent = total;

      let html = '<div class="course-grid">';

      // Primero los cursos activos (inscripciones aprobadas)
      misCursos.forEach(insc => {
        html += renderCursoActivo(insc);
      });

      // Luego las solicitudes pendientes
      misPendientes.forEach(pend => {
        html += renderCursoPendiente(pend);
      });

      html += '</div>';
      container.innerHTML = html;

      // Bind acciones
      container.querySelectorAll('[data-detail]').forEach(btn => {
        btn.onclick = () => abrirDetalle(btn.dataset.detail);
      });
    }

    function renderCursoActivo(insc){
      const curso = insc.curso || {};
      const cohorte = insc.cohorte || {};
      const estadoLabel = insc.curso_completado ? 'Completado' : (insc.acceso_activo ? 'Activo' : 'Inactivo');
      const estadoClass = insc.curso_completado ? 'completado' : 'activo';
      const fechaInicio = cohorte.fecha_inicio 
        ? new Date(cohorte.fecha_inicio).toLocaleDateString('es-BO', {day:'2-digit', month:'short', year:'numeric'}) 
        : '—';
      const slug = curso.slug || '';

      // Modalidad — solo aplica a cursos en vivo (los grabados no tienen distinción virtual/presencial)
      const modalidad = (insc.modalidad || '').toLowerCase();
      const esEnVivo = modalidad === 'virtual' || modalidad === 'presencial';
      const modPillLbl = modalidad === 'presencial' ? '🏛️ Presencial' : '📺 Virtual';
      const modValueLbl = modalidad === 'presencial' 
        ? '🏛️ Presencial · Aula Santa Cruz' 
        : '📺 Virtual · Zoom + grabaciones';

      return `
        <article class="course-card">
          <div class="course-banner">
            <div class="squares"><span></span><span></span><span></span></div>
            <span class="nivel">${escapar(curso.nivel || 'Curso')}</span>
            ${esEnVivo ? `<span class="modalidad-pill ${modalidad}">${modPillLbl}</span>` : ''}
          </div>
          <div class="course-body">
            <span class="course-status ${estadoClass}">● ${estadoLabel}</span>
            <h3 class="course-title">${escapar(curso.titulo || 'Curso')}</h3>
            <p class="course-desc">${escapar(curso.descripcion_corta || 'Formación profesional en ingeniería civil.')}</p>
            <div class="course-meta">
              <div class="meta-row">
                <span class="label">📅 Grupo</span>
                <span class="value">${escapar(cohorte.nombre || 'Por asignar')}</span>
              </div>
              ${esEnVivo ? `
              <div class="meta-row">
                <span class="label">🎓 Modalidad</span>
                <span class="value">${modValueLbl}</span>
              </div>` : ''}
              <div class="meta-row">
                <span class="label">🚀 Inicio</span>
                <span class="value">${fechaInicio}</span>
              </div>
              <div class="meta-row">
                <span class="label">⏱ Duración</span>
                <span class="value">${curso.duracion_horas || '—'} horas</span>
              </div>
            </div>
            <a href="/aula/curso.html?slug=${encodeURIComponent(slug)}" class="course-cta" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">
              Entrar al curso →
            </a>
          </div>
        </article>`;
    }

    function renderCursoPendiente(pend){
      const curso = pend.curso || {};
      const precio = parseFloat(pend.precio_cotizado || 0).toLocaleString('es-BO', {minimumFractionDigits:2});

      // Modalidad
      const modalidad = (pend.modalidad || '').toLowerCase();
      const esEnVivo = modalidad === 'virtual' || modalidad === 'presencial';
      const modPillLbl = modalidad === 'presencial' ? '🏛️ Presencial' : '📺 Virtual';
      const modValueLbl = modalidad === 'presencial' 
        ? '🏛️ Presencial · Aula Santa Cruz' 
        : '📺 Virtual · Zoom + grabaciones';

      return `
        <article class="course-card">
          <div class="course-banner" style="background:linear-gradient(135deg,#D97706 0%,#B45309 100%);">
            <div class="squares"><span></span><span></span><span></span></div>
            <span class="nivel">Solicitud</span>
            ${esEnVivo ? `<span class="modalidad-pill ${modalidad}">${modPillLbl}</span>` : ''}
          </div>
          <div class="course-body">
            <span class="course-status pendiente">⏳ Pendiente de aprobación</span>
            <h3 class="course-title">${escapar(curso.titulo || 'Curso')}</h3>
            <p class="course-desc">Tu solicitud está siendo revisada. Karina (Coordinadora Académica) te contactará por WhatsApp para coordinar el pago.</p>
            <div class="course-meta">
              <div class="meta-row">
                <span class="label">📋 Estado</span>
                <span class="value" style="color:#D97706;">En revisión</span>
              </div>
              ${esEnVivo ? `
              <div class="meta-row">
                <span class="label">🎓 Modalidad</span>
                <span class="value">${modValueLbl}</span>
              </div>` : ''}
              <div class="meta-row">
                <span class="label">💰 Monto</span>
                <span class="value">${pend.moneda || 'BOB'} ${precio}</span>
              </div>
            </div>
            <button class="course-cta disabled" disabled>
              Esperando aprobación
            </button>
          </div>
        </article>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // MODAL DE DETALLE
    // ═══════════════════════════════════════════════════════════════
    function abrirDetalle(inscripcionId){
      const insc = misCursos.find(i => i.id === inscripcionId);
      if(!insc) return;
      const curso = insc.curso || {};
      const cohorte = insc.cohorte || {};

      // Modalidad
      const modalidad = (insc.modalidad || '').toLowerCase();
      const esEnVivo = modalidad === 'virtual' || modalidad === 'presencial';
      const modValueLbl = modalidad === 'presencial' 
        ? '🏛️ Presencial · Aula Santa Cruz de la Sierra' 
        : '📺 Virtual · Zoom + grabaciones permanentes';

      document.getElementById('modalTitle').textContent = curso.titulo || 'Tu curso';
      
      let html = `
        <p>${escapar(curso.descripcion_corta || '')}</p>

        <div class="info-box">
          <strong>📅 Grupo:</strong> ${escapar(cohorte.nombre || 'Por asignar')}<br>
          ${esEnVivo ? `<strong>🎓 Modalidad:</strong> ${modValueLbl}<br>` : ''}
          <strong>🚀 Inicio:</strong> ${cohorte.fecha_inicio ? new Date(cohorte.fecha_inicio).toLocaleDateString('es-BO') : '—'}<br>
          <strong>📆 Fin:</strong> ${cohorte.fecha_fin ? new Date(cohorte.fecha_fin).toLocaleDateString('es-BO') : '—'}<br>
          ${cohorte.dias_clase ? `<strong>🗓 Días:</strong> ${escapar(cohorte.dias_clase)}<br>` : ''}
          ${cohorte.hora_inicio_clase ? `<strong>🕐 Hora:</strong> ${escapar(cohorte.hora_inicio_clase)}<br>` : ''}
          ${cohorte.plataforma ? `<strong>💻 Plataforma:</strong> ${escapar(cohorte.plataforma)}` : ''}
        </div>

        <p><strong>📚 Contenido del curso</strong></p>
        <ul>
          <li>Módulos teóricos con material descargable</li>
          <li>Clases en vivo interactivas</li>
          <li>Ejercicios prácticos y proyectos reales</li>
          <li>Certificado digital al aprobar el examen final</li>
        </ul>

        <div class="info-box" style="border-left-color:var(--green);background:rgba(141,198,63,0.08);margin-top:16px;">
          <strong style="color:var(--green-dark);">🚧 Próximamente disponible</strong><br>
          El acceso al contenido del curso (módulos, lecciones, clases en vivo) estará disponible 
          en las próximas semanas. Karina te enviará el link directo a las clases en vivo por WhatsApp 
          el día de inicio de tu grupo.
        </div>
      `;

      if(cohorte.link_clases){
        html += `
          <a href="${escapar(cohorte.link_clases)}" target="_blank" 
             class="course-cta" 
             style="margin-top:14px;text-decoration:none;display:flex;">
            🎥 Ir a la sala de clases →
          </a>`;
      }

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modalDetail').classList.add('open');
    }

    // ═══════════════════════════════════════════════════════════════
    // UTILIDADES
    // ═══════════════════════════════════════════════════════════════
    function escapar(s){
      if(!s) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = LOGIN_URL;
    });
  </script>

</body>
</html>
