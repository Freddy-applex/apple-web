<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E4A8E"/>
      <stop offset="100%" style="stop-color:#1A2744"/>
    </linearGradient>
    <linearGradient id="ov5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="55%" style="stop-color:rgba(26,39,68,0.55)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.96)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky5)"/>
  <!-- Casa de lujo para avalúo -->
  <!-- Terreno -->
  <rect x="0" y="148" width="400" height="77" fill="#1a3a1a"/>
  <rect x="0" y="148" width="400" height="5" fill="#2d6e2d"/>
  <!-- Casa principal -->
  <rect x="80" y="75" width="240" height="80" fill="#D4C5A0"/>
  <!-- Techo -->
  <polygon points="70,77 200,30 330,77" fill="#8B4513"/>
  <polygon points="74,77 200,34 326,77" fill="#A0522D"/>
  <!-- Columnas clásicas -->
  <rect x="100" y="75" width="12" height="78" fill="#E0D5B0"/>
  <rect x="140" y="75" width="12" height="78" fill="#E0D5B0"/>
  <rect x="248" y="75" width="12" height="78" fill="#E0D5B0"/>
  <rect x="288" y="75" width="12" height="78" fill="#E0D5B0"/>
  <!-- Ventanas con arco -->
  <rect x="165" y="85" width="30" height="35" rx="15" fill="#B8D4E8"/>
  <rect x="205" y="85" width="30" height="35" rx="15" fill="#B8D4E8"/>
  <!-- Puerta principal -->
  <rect x="183" y="115" width="34" height="38" rx="3" fill="#5C3D1A"/>
  <circle cx="210" cy="134" r="3" fill="#FFD700"/>
  <!-- Jardín con árboles -->
  <circle cx="40" cy="140" r="22" fill="#2d6e2d"/>
  <rect x="37" y="138" width="6" height="16" fill="#5C3D1A"/>
  <circle cx="360" cy="138" r="20" fill="#2d6e2d"/>
  <rect x="357" y="136" width="6" height="18" fill="#5C3D1A"/>
  <!-- Documento de avalúo flotante -->
  <rect x="270" y="55" width="90" height="110" rx="5" fill="white" opacity="0.95"/>
  <rect x="274" y="59" width="82" height="12" rx="2" fill="#1A2744"/>
  <text x="315" y="69" font-family="Barlow,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="700">AVALÚO</text>
  <rect x="274" y="76" width="50" height="4" rx="2" fill="#6B6BBB" opacity="0.6"/>
  <rect x="274" y="84" width="82" height="4" rx="2" fill="#ddd"/>
  <rect x="274" y="92" width="70" height="4" rx="2" fill="#ddd"/>
  <rect x="274" y="100" width="82" height="4" rx="2" fill="#ddd"/>
  <rect x="274" y="108" width="60" height="4" rx="2" fill="#ddd"/>
  <!-- Precio destacado -->
  <rect x="274" y="120" width="82" height="26" rx="3" fill="#8DC63F" opacity="0.15"/>
  <text x="315" y="130" font-family="Josefin Sans,sans-serif" font-size="8" fill="#1A2744" text-anchor="middle" font-weight="700">VALOR:</text>
  <text x="315" y="142" font-family="Josefin Sans,sans-serif" font-size="9" fill="#1A2744" text-anchor="middle" font-weight="800">$185,000</text>
  <!-- Sello -->
  <circle cx="315" cy="155" r="12" fill="none" stroke="#6B6BBB" stroke-width="1.5" opacity="0.5"/>
  <text x="315" y="158" font-family="Barlow,sans-serif" font-size="6" fill="#6B6BBB" text-anchor="middle" font-weight="700">OFICIAL</text>

  <rect width="400" height="225" fill="url(#ov5)"/>
  <text x="20" y="178" font-family="Barlow,sans-serif" font-size="9" font-weight="700" fill="#6B6BBB" letter-spacing="2">VALUACIÓN · INMOBILIARIA</text>
  <text x="20" y="196" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">Avalúos</text>
  <text x="20" y="213" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">Inmobiliarios</text>
</svg>