<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#1A2744"/>
    </linearGradient>
    <linearGradient id="screen1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a1a"/>
      <stop offset="100%" style="stop-color:#0d1f0d"/>
    </linearGradient>
    <linearGradient id="overlay1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="60%" style="stop-color:rgba(26,39,68,0.7)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.97)"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="225" fill="url(#sky1)"/>

  <!-- Escritorio de trabajo -->
  <rect x="0" y="120" width="400" height="105" fill="#111820"/>

  <!-- Monitor/laptop -->
  <rect x="80" y="55" width="200" height="130" rx="8" fill="#1a1a2e" stroke="#8DC63F" stroke-width="1.5"/>
  <rect x="88" y="63" width="184" height="110" rx="4" fill="url(#screen1)"/>

  <!-- Pantalla APPLEX simulada -->
  <!-- Header de app -->
  <rect x="88" y="63" width="184" height="22" rx="4" fill="#1A2744"/>
  <rect x="94" y="69" width="60" height="10" rx="2" fill="#8DC63F" opacity="0.9"/>
  <rect x="162" y="69" width="40" height="10" rx="2" fill="#6B6BBB" opacity="0.6"/>
  <rect x="210" y="69" width="30" height="10" rx="2" fill="#6B6BBB" opacity="0.4"/>

  <!-- Tabla de presupuesto simulada -->
  <rect x="92" y="89" width="176" height="8" rx="2" fill="#8DC63F" opacity="0.3"/>
  <rect x="92" y="101" width="80" height="6" rx="2" fill="#fff" opacity="0.15"/>
  <rect x="180" y="101" width="40" height="6" rx="2" fill="#8DC63F" opacity="0.5"/>
  <rect x="228" y="101" width="40" height="6" rx="2" fill="#fff" opacity="0.2"/>

  <rect x="92" y="111" width="80" height="6" rx="2" fill="#fff" opacity="0.1"/>
  <rect x="180" y="111" width="40" height="6" rx="2" fill="#8DC63F" opacity="0.4"/>
  <rect x="228" y="111" width="40" height="6" rx="2" fill="#fff" opacity="0.15"/>

  <rect x="92" y="121" width="80" height="6" rx="2" fill="#fff" opacity="0.12"/>
  <rect x="180" y="121" width="40" height="6" rx="2" fill="#8DC63F" opacity="0.35"/>
  <rect x="228" y="121" width="40" height="6" rx="2" fill="#fff" opacity="0.18"/>

  <rect x="92" y="131" width="80" height="6" rx="2" fill="#fff" opacity="0.08"/>
  <rect x="180" y="131" width="40" height="6" rx="2" fill="#8DC63F" opacity="0.3"/>
  <rect x="228" y="131" width="40" height="6" rx="2" fill="#fff" opacity="0.12"/>

  <!-- Total destacado -->
  <rect x="92" y="143" width="176" height="12" rx="3" fill="#8DC63F" opacity="0.2"/>
  <rect x="228" y="145" width="40" height="8" rx="2" fill="#8DC63F" opacity="0.8"/>

  <!-- Gráfico de barras lateral -->
  <rect x="300" y="70" width="70" height="105" rx="4" fill="#0d1520"/>
  <rect x="308" y="130" width="12" height="38" rx="2" fill="#8DC63F" opacity="0.7"/>
  <rect x="324" y="118" width="12" height="50" rx="2" fill="#6B6BBB" opacity="0.7"/>
  <rect x="340" y="108" width="12" height="60" rx="2" fill="#8DC63F" opacity="0.5"/>
  <rect x="356" y="123" width="12" height="45" rx="2" fill="#6B6BBB" opacity="0.6"/>

  <!-- Planos arquitectónicos en la mesa -->
  <rect x="20" y="145" width="60" height="45" rx="3" fill="#e8e8d0" opacity="0.15" transform="rotate(-5 50 167)"/>
  <rect x="22" y="147" width="56" height="41" rx="2" fill="none" stroke="#8DC63F" stroke-width="0.5" opacity="0.4" transform="rotate(-5 50 167)"/>

  <!-- Calculadora -->
  <rect x="330" y="148" width="45" height="32" rx="4" fill="#1e2a3a"/>
  <rect x="334" y="152" width="37" height="10" rx="2" fill="#8DC63F" opacity="0.3"/>
  <rect x="334" y="165" width="8" height="8" rx="1" fill="#8DC63F" opacity="0.5"/>
  <rect x="345" y="165" width="8" height="8" rx="1" fill="#8DC63F" opacity="0.5"/>
  <rect x="356" y="165" width="8" height="8" rx="1" fill="#8DC63F" opacity="0.5"/>
  <rect x="334" y="176" width="8" height="4" rx="1" fill="#6B6BBB" opacity="0.5"/>
  <rect x="345" y="176" width="8" height="4" rx="1" fill="#6B6BBB" opacity="0.5"/>
  <rect x="356" y="176" width="8" height="4" rx="1" fill="#6B6BBB" opacity="0.5"/>

  <!-- Overlay gradiente -->
  <rect width="400" height="225" fill="url(#overlay1)"/>

  <!-- Texto del curso -->
  <text x="20" y="178" font-family="'Barlow',sans-serif" font-size="9" font-weight="700" fill="#8DC63F" letter-spacing="2" text-transform="uppercase">PRESUPUESTOS · APPLEX PRO</text>
  <text x="20" y="196" font-family="'Josefin Sans',sans-serif" font-size="15" font-weight="700" fill="white">Cómputo y Presupuesto</text>
  <text x="20" y="212" font-family="'Josefin Sans',sans-serif" font-size="15" font-weight="700" fill="white">con PRESCOM y APPLEX Pro</text>

  <!-- Badge NUEVO -->
  <rect x="308" y="10" width="76" height="20" rx="10" fill="#8DC63F"/>
  <text x="346" y="24" font-family="'Barlow',sans-serif" font-size="10" font-weight="800" fill="#1A2744" text-anchor="middle">⭐ NUEVO</text>
