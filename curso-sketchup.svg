<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ov7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="50%" style="stop-color:rgba(26,39,68,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.96)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg7)"/>
  <!-- Render arquitectónico 3D simulado - perspectiva de sala -->
  <!-- Suelo perspectiva -->
  <polygon points="0,225 400,225 320,120 80,120" fill="#2a2a3e"/>
  <polygon points="0,225 400,225 320,120 80,120" fill="none" stroke="#6B6BBB" stroke-width="0.5" opacity="0.3"/>
  <!-- Líneas de piso perspectiva -->
  <line x1="0" y1="225" x2="200" y2="120" stroke="#6B6BBB" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="225" x2="215" y2="120" stroke="#6B6BBB" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="225" x2="240" y2="120" stroke="#6B6BBB" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="225" x2="280" y2="120" stroke="#6B6BBB" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="225" x2="320" y2="120" stroke="#6B6BBB" stroke-width="0.5" opacity="0.2"/>
  <!-- Pared fondo -->
  <rect x="80" y="20" width="240" height="102" fill="#1e1e30"/>
  <rect x="80" y="20" width="240" height="2" fill="#8DC63F" opacity="0.4"/>
  <!-- Ventana grande con luz -->
  <rect x="130" y="30" width="140" height="80" fill="#87CEEB" opacity="0.2"/>
  <rect x="130" y="30" width="140" height="80" fill="none" stroke="#8DC63F" stroke-width="1.5"/>
  <!-- Efecto de luz solar -->
  <polygon points="130,30 270,30 350,90 80,90" fill="#FFE87C" opacity="0.05"/>
  <line x1="200" y1="30" x2="200" y2="110" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <!-- Mueble moderno: sofá -->
  <rect x="100" y="148" width="200" height="40" rx="8" fill="#6B6BBB" opacity="0.7"/>
  <rect x="95" y="140" width="210" height="16" rx="8" fill="#7a7aCC" opacity="0.7"/>
  <rect x="95" y="148" width="16" height="44" rx="4" fill="#5a5aaa" opacity="0.8"/>
  <rect x="289" y="148" width="16" height="44" rx="4" fill="#5a5aaa" opacity="0.8"/>
  <!-- Mesa de centro -->
  <rect x="155" y="175" width="90" height="6" rx="3" fill="#8B4513" opacity="0.7"/>
  <rect x="165" y="180" width="4" height="16" fill="#6B3410" opacity="0.6"/>
  <rect x="231" y="180" width="4" height="16" fill="#6B3410" opacity="0.6"/>
  <!-- Planta decorativa -->
  <circle cx="50" cy="140" r="18" fill="#2d6e2d" opacity="0.8"/>
  <rect x="47" y="140" width="6" height="20" fill="#5C3D1A"/>
  <!-- Lámpara de techo -->
  <line x1="200" y1="20" x2="200" y2="50" stroke="#888" stroke-width="2"/>
  <ellipse cx="200" cy="55" rx="20" ry="8" fill="#FFE87C" opacity="0.3"/>
  <!-- Efecto ENSCAPE glow -->
  <circle cx="200" cy="55" r="30" fill="#FFE87C" opacity="0.05"/>
  <!-- Herramienta 3D cursor -->
  <circle cx="340" cy="80" r="6" fill="none" stroke="#8DC63F" stroke-width="1.5"/>
  <line x1="340" y1="65" x2="340" y2="95" stroke="#8DC63F" stroke-width="1" opacity="0.7"/>
  <line x1="325" y1="80" x2="355" y2="80" stroke="#8DC63F" stroke-width="1" opacity="0.7"/>

  <rect width="400" height="225" fill="url(#ov7)"/>
  <text x="20" y="178" font-family="Barlow,sans-serif" font-size="9" font-weight="700" fill="#8DC63F" letter-spacing="2">SOFTWARE · VISUALIZACIÓN 3D</text>
  <text x="20" y="196" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">SketchUp</text>
  <text x="20" y="213" font-family="Josefin Sans,sans-serif" font-size="15" font-weight="700" fill="white">+ ENSCAPE</text>
  <rect x="296" y="10" width="92" height="20" rx="10" fill="#6B6BBB"/>
  <text x="342" y="24" font-family="Barlow,sans-serif" font-size="9" font-weight="800" fill="white" text-anchor="middle">PRÓXIMAMENTE</text>
</svg>