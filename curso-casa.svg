<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" width="400" height="225">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#4682B4"/>
    </linearGradient>
    <linearGradient id="wall2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B896"/>
      <stop offset="100%" style="stop-color:#B8976A"/>
    </linearGradient>
    <linearGradient id="overlay2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="55%" style="stop-color:rgba(26,39,68,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(26,39,68,0.95)"/>
    </linearGradient>
  </defs>

  <!-- Cielo -->
  <rect width="400" height="225" fill="url(#sky2)"/>

  <!-- Nubes -->
  <ellipse cx="60" cy="30" rx="35" ry="16" fill="white" opacity="0.7"/>
  <ellipse cx="90" cy="25" rx="28" ry="14" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="35" rx="40" ry="15" fill="white" opacity="0.6"/>
  <ellipse cx="355" cy="28" rx="25" ry="12" fill="white" opacity="0.7"/>

  <!-- Sol -->
  <circle cx="350" cy="45" r="22" fill="#FFD700" opacity="0.5"/>
  <circle cx="350" cy="45" r="16" fill="#FFE44D" opacity="0.6"/>

  <!-- Terreno -->
  <rect x="0" y="155" width="400" height="70" fill="#4a7c3f"/>
  <rect x="0" y="155" width="400" height="8" fill="#5a9e4a"/>

  <!-- Casa planta baja -->
  <rect x="80" y="100" width="240" height="65" fill="url(#wall2)"/>
  <!-- Ladrillo simulado -->
  <line x1="80" y1="115" x2="320" y2="115" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>
  <line x1="80" y1="128" x2="320" y2="128" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>
  <line x1="80" y1="141" x2="320" y2="141" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>
  <line x1="80" y1="154" x2="320" y2="154" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>

  <!-- Planta alta -->
  <rect x="100" y="50" width="200" height="58" fill="#C8A878"/>
  <line x1="100" y1="65" x2="300" y2="65" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="78" x2="300" y2="78" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="91" x2="300" y2="91" stroke="#a07850" stroke-width="0.8" opacity="0.4"/>

  <!-- Techo -->
  <polygon points="85,52 200,15 315,52" fill="#8B4513"/>
  <polygon points="88,52 200,18 312,52" fill="#A0522D"/>
  <!-- Tejas simuladas -->
  <line x1="130" y1="38" x2="145" y2="52" stroke="#6B3410" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="28" x2="175" y2="52" stroke="#6B3410" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="20" x2="200" y2="52" stroke="#6B3410" stroke-width="1" opacity="0.5"/>
  <line x1="225" y1="28" x2="215" y2="52" stroke="#6B3410" stroke-width="1" opacity="0.5"/>
  <line x1="255" y1="38" x2="245" y2="52" stroke="#6B3410" stroke-width="1" opacity="0.5"/>

  <!-- Ventanas planta alta -->
  <rect x="120" y="58" width="36" height="28" rx="2" fill="#B8D4E8"/>
  <line x1="138" y1="58" x2="138" y2="86" stroke="#888" stroke-width="1"/>
  <line x1="120" y1="72" x2="156" y2="72" stroke="#888" stroke-width="1"/>
  <rect x="244" y="58" width="36" height="28" rx="2" fill="#B8D4E8"/>
  <line x1="262" y1="58" x2="262" y2="86" stroke="#888" stroke-width="1"/>
  <line x1="244" y1="72" x2="280" y2="72" stroke="#888" stroke-width="1"/>

  <!-- Ventanas planta baja -->
  <rect x="90" y="108" width="50" height="38" rx="2" fill="#B8D4E8"/>
  <line x1="115" y1="108" x2="115" y2="146" stroke="#888" stroke-width="1"/>
  <line x1="90" y1="127" x2="140" y2="127" stroke="#888" stroke-width="1"/>
  <rect x="260" y="108" width="50" height="38" rx="2" fill="#B8D4E8"/>
  <line x1="285" y1="108" x2="285" y2="146" stroke="#888" stroke-width="1"/>
  <line x1="260" y1="127" x2="310" y2="127" stroke="#888" stroke-width="1"/>

  <!-- Puerta -->
  <rect x="173" y="118" width="54" height="47" rx="3" fill="#6B4A2A"/>
  <circle cx="220" cy="142" r="3" fill="#FFD700"/>
  <line x1="200" y1="118" x2="200" y2="165" stroke="#5a3a1a" stroke-width="1"/>

  <!-- Jardín -->
  <ellipse cx="50" cy="152" rx="25" ry="30" fill="#2d6e2d"/>
  <ellipse cx="365" cy="152" rx="20" ry="25" fill="#2d6e2d"/>

  <!-- Vereda -->
  <rect x="168" y="155" width="64" height="20" fill="#ccc" opacity="0.5"/>

  <!-- Overlay -->
  <rect width="400" height="225" fill="url(#overlay2)"/>

  <!-- Texto -->
  <text x="20" y="178" font-family="'Barlow',sans-serif" font-size="9" font-weight="700" fill="#8DC63F" letter-spacing="2">CONSTRUCCIÓN · VIVIENDA</text>
  <text x="20" y="196" font-family="'Josefin Sans',sans-serif" font-size="15" font-weight="700" fill="white">Construcción de Casa</text>
  <text x="20" y="213" font-family="'Josefin Sans',sans-serif" font-size="15" font-weight="700" fill="white">de 2 Plantas</text>
</svg>
